isMobile && started>0 ? el(“div”,{style:{position:“fixed”,bottom:“0”,left:“0”,right:“0”,background:C.bgDeep,borderTop:“2px solid “+C.borderGold,padding:“0.7rem 1rem”,display:“flex”,alignItems:“center”,justifyContent:“space-between”,zIndex:“30”}},
el(“div”,{style:{fontSize:“0.72rem”,color:C.textLight}},complete===TOTAL?“All complete!”:complete+”/”+TOTAL+” complete”),
el(“button”,{onClick:props.onReview,style:{padding:“0.55rem 1.2rem”,background:goldGrad,border:“none”,borderRadius:“6px”,color:C.text,fontSize:“0.75rem”,cursor:“pointer”,fontFamily:ff,fontWeight:“700”}},“Review and Submit”)
) : null
);
}

// –– Confirm ––
function ConfirmScreen(props){
var isMobile=useWidth()<680;
var editState=useState(false); var editing=editState[0],setEditing=editState[1];
var complete=countComplete(props.picks);
if(editing) return el(BallotScreen,{name:props.name,picks:props.picks,setPicks:props.setPicks,onReview:function(){setEditing(false);}});
return el(“div”,{style:{minHeight:“100vh”,background:C.bg}},
el(Header,{name:props.name,picks:props.picks,isMobile:false}),
el(“div”,{style:{maxWidth:“700px”,margin:“0 auto”,padding:isMobile?“1.25rem 1rem 6rem”:“2rem”}},
el(“div”,{style:{marginBottom:“1.4rem”}},
el(“div”,{style:{fontSize:“0.58rem”,letterSpacing:“0.3em”,color:C.gold,textTransform:“uppercase”,marginBottom:“0.35rem”}},“Review Ballot”),
el(“h2”,{style:{margin:“0”,fontSize:isMobile?“1.4rem”:“1.9rem”,fontWeight:“400”,color:C.text}},props.name+”’s Picks”),
el(“div”,{style:{color:C.textLight,fontSize:“0.75rem”,marginTop:“0.35rem”}},complete+”/”+TOTAL+” fully complete”)
),
el(“div”,{style:{display:“flex”,gap:“0.5rem”,padding:“0.4rem 0.85rem”,marginBottom:“0.3rem”}},
el(“div”,{style:{minWidth:isMobile?“85px”:“165px”,flexShrink:“0”}}),
el(“div”,{style:{flex:“1”,fontSize:“0.65rem”,fontWeight:“bold”,color:C.willWin,textTransform:“uppercase”,letterSpacing:“0.1em”}},“Will Win”),
el(“div”,{style:{flex:“1”,fontSize:“0.65rem”,fontWeight:“bold”,color:C.shouldWin,textTransform:“uppercase”,letterSpacing:“0.1em”}},“Should Win”),
el(“div”,{style:{width:“28px”}})
),
el(“div”,{style:{display:“flex”,flexDirection:“column”,gap:“0.35rem”,marginBottom:“1.5rem”}},
CATEGORIES.map(function(c){
var p=getPick(props.picks,c.id);
return el(“div”,{key:c.id,style:{display:“flex”,gap:“0.5rem”,padding:“0.55rem 0.85rem”,background:(p.willWin||p.shouldWin)?C.bgCard:”#FFF8F5”,border:“1px solid “+((p.willWin||p.shouldWin)?C.border:”#DDBBAA”),borderRadius:“5px”,alignItems:“flex-start”}},
el(“div”,{style:{color:C.textLight,fontSize:“0.67rem”,lineHeight:“1.4”,minWidth:isMobile?“85px”:“165px”,flexShrink:“0”,paddingTop:“1px”}},c.name),
el(“div”,{style:{flex:“1”,color:p.willWin?C.willWin:”#CCC”,fontSize:“0.75rem”,lineHeight:“1.4”}},p.willWin?p.willWin.split(” - “)[0]:”-”),
el(“div”,{style:{flex:“1”,color:p.shouldWin?C.shouldWin:”#CCC”,fontSize:“0.75rem”,lineHeight:“1.4”}},p.shouldWin?p.shouldWin.split(” - “)[0]:”-”),
el(“button”,{onClick:function(){setEditing(true);},style:{background:“transparent”,border:“none”,color:C.textLight,cursor:“pointer”,fontSize:“0.65rem”,padding:“0”,fontFamily:ff,flexShrink:“0”,width:“28px”,textAlign:“right”}},“edit”)
);
})
)
),
el(“div”,{style:{position:“fixed”,bottom:“0”,left:“0”,right:“0”,background:C.bgDeep,borderTop:“2px solid “+C.borderGold,padding:“0.75rem 1rem”,display:“flex”,gap:“0.65rem”,zIndex:“30”,boxShadow:“0 -2px 10px rgba(0,0,0,0.08)”}},
el(“button”,{onClick:props.onBack,style:{padding:“0.85rem 1.1rem”,background:“transparent”,border:“1px solid “+C.border,borderRadius:“6px”,color:C.textMid,fontSize:“0.78rem”,cursor:“pointer”,fontFamily:ff,whiteSpace:“nowrap”}},”< Back”),
el(“button”,{onClick:props.onSubmit,disabled:props.saving,style:{flex:“1”,padding:“0.85rem”,background:goldGrad,border:“none”,borderRadius:“6px”,color:C.text,fontSize:“0.85rem”,cursor:“pointer”,fontFamily:ff,fontWeight:“700”,opacity:props.saving?0.7:1}},props.saving?“Submitting…”:“Submit My Ballot”)
)
);
}

// –– Success ––
function SuccessScreen(props){
return el(“div”,{style:{minHeight:“100vh”,background:C.bg,display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”,padding:“1.5rem”,textAlign:“center”}},
el(“div”,{style:{fontSize:“4rem”,marginBottom:“0.75rem”}},”(Trophy)”),
el(“div”,{style:{fontSize:“0.6rem”,letterSpacing:“0.4em”,color:C.gold,marginBottom:“0.55rem”,textTransform:“uppercase”}},“Ballot Submitted”),
el(“h2”,{style:{fontSize:“clamp(1.5rem,6vw,2.2rem)”,fontWeight:“400”,color:C.text,margin:“0 0 1rem”}},“Good luck, “+props.name+”!”),
el(“p”,{style:{color:C.textMid,maxWidth:“340px”,lineHeight:“1.75”,marginBottom:“2rem”,fontSize:“0.88rem”}},“Your ballot is saved. Tune in Sunday March 15 on ABC at 7:00 PM ET.”),
el(“div”,{style:{display:“flex”,flexDirection:“column”,gap:“0.7rem”,width:“100%”,maxWidth:“340px”}},
el(“button”,{onClick:props.onViewSubs,style:{padding:“1rem”,background:goldGrad,border:“none”,borderRadius:“6px”,color:C.text,fontSize:“0.85rem”,cursor:“pointer”,fontFamily:ff,fontWeight:“700”}},“See All Submissions”),
el(“button”,{onClick:props.onReset,style:{padding:“0.9rem”,background:“transparent”,border:“1px solid “+C.border,borderRadius:“6px”,color:C.textMid,fontSize:“0.85rem”,cursor:“pointer”,fontFamily:ff}},“Submit Another Ballot”)
)
);
}

// –– Leaderboard ––
function LeaderboardScreen(props){
var isMobile=useWidth()<680;
var expState=useState(null); var expanded=expState[0],setExpanded=expState[1];
return el(“div”,{style:{minHeight:“100vh”,background:C.bg,padding:isMobile?“1.25rem 1rem”:“2rem”,maxWidth:“720px”,margin:“0 auto”}},
el(“div”,{style:{display:“flex”,alignItems:“center”,justifyContent:“space-between”,marginBottom:“1.75rem”}},
el(“div”,null,
el(“div”,{style:{fontSize:“0.6rem”,letterSpacing:“0.3em”,color:C.gold,textTransform:“uppercase”,marginBottom:“0.35rem”}},“98th Academy Awards”),
el(“h2”,{style:{margin:“0”,fontSize:isMobile?“1.4rem”:“1.8rem”,fontWeight:“400”,color:C.text}},“Submissions”)
),
el(“button”,{onClick:props.onBack,style:{padding:“0.6rem 1rem”,background:“transparent”,border:“1.5px solid “+C.borderGold,borderRadius:“6px”,color:C.gold,fontSize:“0.75rem”,cursor:“pointer”,fontFamily:ff,whiteSpace:“nowrap”}},”+ Add Mine”)
),
props.subs.length===0
? el(“div”,{style:{textAlign:“center”,color:C.textLight,padding:“4rem 0”}},“No submissions yet. Be the first!”)
: el(“div”,{style:{display:“flex”,flexDirection:“column”,gap:“0.9rem”}},
props.subs.map(function(s,i){
var open=expanded===i;
var cnt=Object.keys(s.picks||{}).length;
return el(“div”,{key:s.id||i,style:{background:C.bgCard,border:“1.5px solid “+C.border,borderRadius:“8px”,overflow:“hidden”}},
el(“button”,{onClick:function(){setExpanded(open?null:i);},style:{width:“100%”,padding:“0.85rem 1rem”,background:C.bgDeep,border:“none”,display:“flex”,alignItems:“center”,justifyContent:“space-between”,cursor:“pointer”,fontFamily:ff,textAlign:“left”}},
el(“div”,null,
el(“div”,{style:{color:C.text,fontSize:“0.95rem”,fontWeight:“bold”}},s.name),
el(“div”,{style:{color:C.textLight,fontSize:“0.65rem”,marginTop:“2px”}},cnt+”/”+TOTAL+” categories - “+new Date(s.submittedAt).toLocaleDateString())
),
el(“span”,{style:{color:C.gold,fontSize:“0.75rem”}},open?”^”:“v”)
),
open ? el(“div”,{style:{padding:“0.85rem 1rem”}},
el(“div”,{style:{display:“flex”,gap:“0.5rem”,padding:“0.3rem 0”,marginBottom:“0.3rem”,borderBottom:“1px solid “+C.border}},
el(“div”,{style:{minWidth:isMobile?“80px”:“150px”,flexShrink:“0”}}),
el(“div”,{style:{flex:“1”,fontSize:“0.62rem”,fontWeight:“bold”,color:C.willWin,textTransform:“uppercase”}},“Will Win”),
el(“div”,{style:{flex:“1”,fontSize:“0.62rem”,fontWeight:“bold”,color:C.shouldWin,textTransform:“uppercase”}},“Should Win”)
),
el(React.Fragment,null,CATEGORIES.map(function(c){
var p=getPick(s.picks||{},c.id);
return el(“div”,{key:c.id,style:{display:“flex”,gap:“0.5rem”,padding:“0.25rem 0”,borderBottom:“1px solid “+C.bgDeep}},
el(“div”,{style:{color:C.textLight,fontSize:“0.68rem”,minWidth:isMobile?“80px”:“150px”,flexShrink:“0”}},c.name),
el(“div”,{style:{flex:“1”,color:p.willWin?C.willWin:C.border,fontSize:“0.72rem”}},p.willWin?p.willWin.split(” - “)[0]:”-”),
el(“div”,{style:{flex:“1”,color:p.shouldWin?C.shouldWin:C.border,fontSize:“0.72rem”}},p.shouldWin?p.shouldWin.split(” - “)[0]:”-”)
);
}))
) : null
);
})
)
);
}

// –– Root App ––
function App(){
var stepState=useState(“intro”); var step=stepState[0],setStep=stepState[1];
var nameState=useState(””); var name=nameState[0],setName=nameState[1];
var picksState=useState({}); var picks=picksState[0],setPicks=picksState[1];
var subsState=useState([]); var subs=subsState[0],setSubs=subsState[1];
var savingState=useState(false); var saving=savingState[0],setSaving=savingState[1];

useEffect(function(){loadSubs().then(setSubs);;},[]);

function submit(){
setSaving(true);
saveSub({name:name.trim(),picks:picks,submittedAt:new Date().toISOString(),id:Math.random().toString(36).slice(2)}).then(function(){
return loadSubs();
}).then(function(updated){
setSubs(updated);setSaving(false);setStep(“success”);
});
}
function reset(){setName(””);setPicks({});setStep(“intro”);}
function goLeaderboard(){loadSubs().then(function(s){setSubs(s);setStep(“leaderboard”);});}

if(step===“intro”) return el(IntroScreen,{name:name,setName:setName,onStart:function(){setStep(“ballot”);},subCount:subs.length,onViewSubs:goLeaderboard});
if(step===“ballot”) return el(BallotScreen,{name:name,picks:picks,setPicks:setPicks,onReview:function(){setStep(“confirm”);}});
if(step===“confirm”) return el(ConfirmScreen,{name:name,picks:picks,setPicks:setPicks,onSubmit:submit,onBack:function(){setStep(“ballot”);},saving:saving});
if(step===“success”) return el(SuccessScreen,{name:name,onViewSubs:goLeaderboard,onReset:reset});
if(step===“leaderboard”) return el(LeaderboardScreen,{subs:subs,onBack:reset});
return null;
}

ReactDOM.createRoot(document.getElementById(“root”)).render(el(App,null));
</script>
