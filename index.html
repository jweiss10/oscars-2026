// ── JSONBIN ───────────────────────────────────────────────────────────────────
const BASE = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
const HDR  = { “Content-Type”:“application/json”, “X-Master-Key”: JSONBIN_API_KEY, “X-Bin-Versioning”:“false” };

async function loadSubs() {
try {
const r = await fetch(BASE, { headers: HDR });
if (!r.ok) throw new Error();
const j = await r.json();
return (Array.isArray(j.record) ? j.record : []).filter(s => !s.init);
} catch { return []; }
}
async function saveSub(sub) {
const existing = await loadSubs();
existing.push(sub);
// preserve init record
await fetch(BASE, { method:“PUT”, headers: HDR, body: JSON.stringify([{init:true}, …existing]) });
}

// ── HOOKS ─────────────────────────────────────────────────────────────────────
function useWidth() {
const [w, setW] = React.useState(window.innerWidth);
React.useEffect(() => {
const h = () => setW(window.innerWidth);
window.addEventListener(“resize”, h);
return () => window.removeEventListener(“resize”, h);
}, []);
return w;
}

// picks shape: { [catId]: { willWin: string|null, shouldWin: string|null } }
function emptyPick() { return { willWin: null, shouldWin: null }; }
function getPick(picks, catId) { return picks[catId] || emptyPick(); }
function setCatPick(picks, catId, type, nominee) {
const cur = getPick(picks, catId);
return { …picks, [catId]: { …cur, [type]: nominee } };
}
function countPicked(picks) {
return CATEGORIES.filter(c => {
const p = getPick(picks, c.id);
return p.willWin || p.shouldWin;
}).length;
}
function countComplete(picks) {
return CATEGORIES.filter(c => {
const p = getPick(picks, c.id);
return p.willWin && p.shouldWin;
}).length;
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App() {
const [step, setStep]   = React.useState(“intro”);
const [name, setName]   = React.useState(””);
const [picks, setPicks] = React.useState({});
const [subs, setSubs]   = React.useState([]);
const [saving, setSaving] = React.useState(false);

React.useEffect(() => { loadSubs().then(setSubs); }, []);

async function submit() {
setSaving(true);
await saveSub({ name: name.trim(), picks, submittedAt: new Date().toISOString(), id: Math.random().toString(36).slice(2) });
const updated = await loadSubs();
setSubs(updated);
setSaving(false);
setStep(“success”);
}

function reset() { setName(””); setPicks({}); setStep(“intro”); }
async function goLeaderboard() { const s = await loadSubs(); setSubs(s); setStep(“leaderboard”); }

if (step === “intro”)       return <IntroScreen name={name} setName={setName} onStart={() => setStep(“ballot”)} subCount={subs.length} onViewSubs={goLeaderboard} />;
if (step === “ballot”)      return <BallotScreen name={name} picks={picks} setPicks={setPicks} onReview={() => setStep(“confirm”)} />;
if (step === “confirm”)     return <ConfirmScreen name={name} picks={picks} setPicks={setPicks} onSubmit={submit} onBack={() => setStep(“ballot”)} saving={saving} />;
if (step === “success”)     return <SuccessScreen name={name} onViewSubs={goLeaderboard} onReset={reset} />;
if (step === “leaderboard”) return <LeaderboardScreen subs={subs} onBack={reset} />;
return null;
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App />);
</script>
