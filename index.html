function App(){
const [step,setStep]=React.useState(“intro”);
const [name,setName]=React.useState(””);

const [subs,setSubs]=React.useState([]);
const [saving,setSaving]=React.useState(false);

React.useEffect(function(){loadSubs().then(setSubs);;},[]);

async function submit(){
setSaving(true);
await saveSub({name:name.trim(),picks:picks,submittedAt:new Date().toISOString(),id:Math.random().toString(36).slice(2)});
const updated=await loadSubs();
setSubs(updated);
setSaving(false);
setStep(“success”);
}
function reset(){setName(””);setPicks({});setStep(“intro”);}
async function goLeaderboard(){const s=await loadSubs();setSubs(s);setStep(“leaderboard”);}

if(step===“intro”)return React.createElement(IntroScreen,{name:name,setName:setName,onStart:function(){setStep(“ballot”);},subCount:subs.length,onViewSubs:goLeaderboard});
if(step===“ballot”)return React.createElement(BallotScreen,{name:name,picks:picks,setPicks:setPicks,onReview:function(){setStep(“confirm”);}});
if(step===“confirm”)return React.createElement(ConfirmScreen,{name:name,picks:picks,setPicks:setPicks,onSubmit:submit,onBack:function(){setStep(“ballot”);},saving:saving});
if(step===“success”)return React.createElement(SuccessScreen,{name:name,onViewSubs:goLeaderboard,onReset:reset});
if(step===“leaderboard”)return React.createElement(LeaderboardScreen,{subs:subs,onBack:reset});
return null;
}

ReactDOM.createRoot(document.getElementById(“root”)).render(React.createElement(App));
</script>
